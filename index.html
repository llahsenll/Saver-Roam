<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roam Trips — Tour Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0a0d;
    --panel: #1a0d14;
    --panel-2: #13080d;
    --line: #2a1520;
    --crimson: #FF0055;
    --crimson-deep: #b8003b;
    --rose: #9B4460;
    --rose-soft: #d4a8b8;
    --cream: #f5ede8;
    --green: #22c55e;
    --green-bg: #052010;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 0%, rgba(255,0,85,0.06), transparent 40%),
                      radial-gradient(circle at 100% 100%, rgba(184,0,59,0.05), transparent 45%);
    color: var(--cream);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }
  header {
    border-bottom: 1px solid var(--line);
    background: var(--panel-2);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo { display: flex; align-items: baseline; gap: 5px; }
  .logo .roam { font-weight: 800; font-size: 22px; color: var(--crimson); letter-spacing: -1px; }
  .logo .trips { font-weight: 400; font-size: 22px; color: var(--rose); letter-spacing: -1px; }
  .divider { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
  .tag { font-size: 11px; letter-spacing: 3px; color: var(--rose); text-transform: uppercase; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px 0; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .sub { color: var(--rose-soft); font-size: 14px; line-height: 1.6; margin-bottom: 32px; max-width: 560px; }
  .sub code { background: var(--panel); padding: 2px 7px; border-radius: 5px; color: var(--crimson); font-size: 12px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--rose); text-transform: uppercase; margin-bottom: 8px; }

  textarea, input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  textarea:focus, input:focus, select:focus { border-color: var(--crimson); }
  textarea { min-height: 220px; resize: vertical; line-height: 1.6; font-family: 'SF Mono', 'Monaco', monospace; font-size: 13px; }

  .row { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 200px; }

  button {
    margin-top: 22px;
    width: 100%;
    padding: 15px 0;
    background: linear-gradient(135deg, var(--crimson), var(--crimson-deep));
    border: none;
    border-radius: 11px;
    color: white;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  button:hover:not(:disabled) { transform: translateY(-2px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .preview { margin-top: 20px; display: none; }
  .preview.show { display: block; }
  .pv-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .pv-name { font-size: 18px; font-weight: 700; }
  .pv-score { font-size: 34px; font-weight: 800; color: var(--crimson); line-height: 1; }
  .pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { background: var(--line); border-radius: 20px; padding: 4px 12px; font-size: 11px; letter-spacing: 1px; color: var(--rose-soft); text-transform: uppercase; }

  .msg { margin-top: 18px; border-radius: 10px; padding: 15px 18px; font-size: 13px; line-height: 1.6; display: none; }
  .msg.show { display: block; }
  .msg.ok { background: var(--green-bg); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .msg.err { background: #2a0d14; border: 1px solid var(--crimson-deep); color: #ff6b8a; }
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="roam">roam</span><span class="trips">trips</span></div>
    <div class="divider"></div>
    <span class="tag">Tour Saver</span>
  </header>

  <div class="wrap">
    <h1>Save a vetted tour</h1>
    <p class="sub">Paste the scorecard JSON from your Claude chat below, add the affiliate link, and hit save. It writes straight to your Airtable — no API costs, no fuss.</p>

    <div class="card">
      <label>Scorecard JSON (paste from chat)</label>
      <textarea id="json" placeholder='{
  "name": "...",
  "city": "Tokyo",
  "roam_score": 83,
  ...
}'></textarea>

      <div class="row">
        <div>
          <label>Affiliate URL (from your dashboard)</label>
          <input id="affiliate" placeholder="https://..." />
        </div>
        <div>
          <label>Status</label>
          <select id="status">
            <option>Approved</option>
            <option>Pending</option>
            <option>Rejected</option>
          </select>
        </div>
      </div>

      <div class="preview" id="preview">
        <div class="pv-head">
          <div class="pv-name" id="pvName"></div>
          <div class="pv-score" id="pvScore"></div>
        </div>
        <div class="pills" id="pvPills"></div>
      </div>

      <button id="saveBtn">Save to Airtable →</button>

      <div class="msg" id="msg"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const jsonEl = $("json"), preview = $("preview"), msg = $("msg");

  // Live preview as they paste
  jsonEl.addEventListener("input", () => {
    msg.className = "msg";
    try {
      const d = JSON.parse(jsonEl.value);
      $("pvName").textContent = d.name || "Untitled";
      $("pvScore").textContent = d.roam_score ?? "—";
      const tags = [d.city, d.category, d.price_tier, d.duration, d.group_type, d.language].filter(Boolean);
      $("pvPills").innerHTML = tags.map(t => `<span class="pill">${t}</span>`).join("");
      preview.classList.add("show");
    } catch {
      preview.classList.remove("show");
    }
  });

  $("saveBtn").addEventListener("click", async () => {
    msg.className = "msg";
    let payload;
    try {
      payload = JSON.parse(jsonEl.value);
    } catch {
      msg.textContent = "That's not valid JSON. Paste the full scorecard block from the chat.";
      msg.classList.add("show", "err");
      return;
    }

    payload.affiliate_url = $("affiliate").value.trim();
    payload.status = $("status").value;

    const btn = $("saveBtn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const res = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.innerHTML = "✓ Saved to Airtable — record <code>" + data.id + "</code>. Sync Framer to see it live.";
        msg.classList.add("show", "ok");
        jsonEl.value = "";
        $("affiliate").value = "";
        preview.classList.remove("show");
      } else {
        throw new Error(data.error || "Unknown error");
      }
    } catch (err) {
      msg.textContent = "Save failed: " + err.message;
      msg.classList.add("show", "err");
    } finally {
      btn.disabled = false;
      btn.textContent = "Save to Airtable →";
    }
  });
</script>
</body>
</html>
