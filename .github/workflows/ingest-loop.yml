name: Ingest Loop

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # lets you trigger it manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # stay under GitHub's 360min/6h default job cap
    steps:
      - name: Run ingestion loops
        run: |
          BASE_URL="https://saver-roam.vercel.app"
          END_TIME=$(( $(date +%s) + 345*60 ))

          loop_tours() {
            while [ $(date +%s) -lt $END_TIME ]; do
              curl -s -m 65 "$BASE_URL/api/ingest-tours" -o /dev/null -w "tours: %{http_code}\n"
              sleep 2
            done
          }

          loop_availability() {
            while [ $(date +%s) -lt $END_TIME ]; do
              curl -s -m 65 "$BASE_URL/api/ingest-availability" -o /dev/null -w "availability: %{http_code}\n"
              sleep 2
            done
          }

          loop_tours &
          wait
